services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      - TZ=America/Santiago
      - LOG_LEVEL=info
      - MAX_CONCURRENT_SESSIONS=2
    ports:
      - "8191:8191"
    restart: unless-stopped
    networks:
      - default

networks:
  default:
    name: caddy_net
    external: true
