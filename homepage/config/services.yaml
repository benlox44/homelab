---
- Applications:
    - Jellyfin:
        icon: jellyfin.png
        href: "https://tv.lacto.vip"
        description: "Media Server"
        ping: https://tv.lacto.vip
        widget:
            type: jellyfin
            url: https://tv.lacto.vip
            key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"

    - Jellyseerr:
        icon: jellyseerr.png
        href: "https://requests.lacto.vip"
        description: "Movies & TV Requests"
        server: my-docker
        container: jellyseerr
        ping: http://requests.lacto.vip
        widget:
            type: jellyseerr
            url: http://jellyseerr:5055
            key: "{{HOMEPAGE_VAR_JELLYSEERR_API_KEY}}"


    - Immich:
        icon: immich.png
        href: "https://photos.lacto.vip"
        description: "Photos & Videos"
        server: my-docker
        container: immich-server
        ping: http://immich-server:2283
        widget:
            type: immich
            url: http://immich-server:2283
            key: "{{HOMEPAGE_VAR_IMMICH_API_KEY}}"
            version: 2

    - Filebrowser:
        icon: filebrowser.png
        href: "https://drive.lacto.vip"
        description: "Private Cloud"
        server: my-docker
        container: filebrowser
        ping: http://filebrowser:80
        widget:
            type: customapi
            url: http://filebrowser:80/health
            refreshInterval: 10000

- Media & Downloads:
    - Radarr:
        icon: radarr.png
        href: "https://movies.lacto.vip"
        description: "Movie Management"
        server: my-docker
        container: radarr
        ping: http://radarr:7878
        widget:
            type: radarr
            url: http://radarr:7878
            key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"

    - Sonarr:
        icon: sonarr.png
        href: "https://series.lacto.vip"
        description: "TV Show Management"
        server: my-docker
        container: sonarr
        ping: http://sonarr:8989
        widget:
            type: sonarr
            url: http://sonarr:8989
            key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"

    - Bazarr:
        icon: bazarr.png
        href: "https://subs.lacto.vip"
        description: "Subtitle Management"
        server: my-docker
        container: bazarr
        ping: http://bazarr:6767
        widget:
            type: bazarr
            url: http://bazarr:6767
            key: "{{HOMEPAGE_VAR_BAZARR_API_KEY}}"

    - Prowlarr:
        icon: prowlarr.png
        href: "https://prowlarr.lacto.vip"
        description: "Indexer Manager"
        server: my-docker
        container: prowlarr
        ping: http://prowlarr:9696
        widget:
            type: prowlarr
            url: http://prowlarr:9696
            key: "{{HOMEPAGE_VAR_PROWLARR_API_KEY}}"

    - qBittorrent:
        icon: qbittorrent.png
        href: "https://torrent.lacto.vip/"
        description: "Torrent Client"
        server: my-docker
        container: qbittorrent
        ping: http://qbittorrent:8080
        widget:
            type: qbittorrent
            url: http://qbittorrent:8080
            username: "{{HOMEPAGE_VAR_ADMIN_USER}}"
            password: "{{HOMEPAGE_VAR_ADMIN_PASS}}"

- Infrastructure:
    - AdGuard DNS:
        icon: adguard-home.png
        href: "https://adguard.lacto.vip"
        description: "DNS & Ad Blocker"
        server: my-docker
        container: adguard
        ping: http://adguard:8083
        widget:
            type: adguard
            url: http://adguard:8083
            username: "{{HOMEPAGE_VAR_ADMIN_USER}}"
            password: "{{HOMEPAGE_VAR_ADMIN_PASS}}"

    - Nginx Proxy:
        icon: nginx-proxy-manager.png
        href: "https://nginx.lacto.vip"
        description: "Reverse Proxy"
        server: my-docker
        container: nginx
        ping: http://nginx:81
        widget:
            type: npm
            url: http://nginx:81
            username: "{{HOMEPAGE_VAR_ADMIN_EMAIL}}"
            password: "{{HOMEPAGE_VAR_ADMIN_PASS}}"

    - Tailscale:
        icon: tailscale.png
        href: "https://login.tailscale.com/admin/machines"
        description: "VPN Management"

    - Landing Page:
        icon: mdi-web
        href: "https://lacto.vip"
        description: "Personal Landing Page"

- Gaming:
    - Minecraft Map:
        icon: minecraft.png
        href: "https://map.lacto.vip"
        description: "Live Server Map"
        ping: http://minecraft-squaremap:80

    - Modpack Download:
        icon: mdi-file-download
        href: "https://drive.lacto.vip/share/a5E8RutE"
        description: "Modpack Share Page"
