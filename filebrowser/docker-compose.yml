services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    ports:
      - "8084:80"
    volumes:
      - ${HDD_ROOT:-/data}/filebrowser:/srv
      - ./config:/config
    environment:
      - FB_DATABASE=/config/database.db
      - FB_PORT=80
    networks:
      - default

networks:
  default:
    name: caddy_net
    external: true
